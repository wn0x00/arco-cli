name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        node-version: [22, 24]
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: yarn

      - run: yarn install --frozen-lockfile --ignore-scripts
      - run: yarn lint
      - run: yarn build
      - run: yarn test

  template-build:
    # Heavy job: install React/Vite/etc into the bundled templates and make
    # sure they actually produce a dist/. Catches templates that compile
    # against our CLI's expectations but break against fresh npm-resolved
    # dep versions.
    strategy:
      fail-fast: false
      matrix:
        preset: [full, simple]
    runs-on: ubuntu-latest
    needs: verify

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - run: yarn install --frozen-lockfile --ignore-scripts
      - run: yarn build

      - name: Scaffold ${{ matrix.preset }} template into a sandbox
        run: |
          node -e "
            const fs = require('fs-extra');
            const path = require('path');
            const { downloadAndCopyTemplate } = require('./lib/init/template');
            (async () => {
              const root = path.resolve('sandbox-app');
              fs.ensureDirSync(root);
              await downloadAndCopyTemplate({
                root,
                template: 'pro-recommend',
                bundledPreset: '${{ matrix.preset }}',
              });
              for (const f of ['package.json', 'index.html']) {
                const p = path.join(root, f);
                fs.writeFileSync(p, fs.readFileSync(p, 'utf8').replace(/@CONST_PACKAGE_NAME@/g, 'sandbox-app'));
              }
              fs.copyFileSync(path.join(root, 'gitignore'), path.join(root, '.gitignore'));
            })();
          "

      - name: Install + build the scaffolded project
        working-directory: sandbox-app
        run: |
          npm install --no-audit --no-fund
          npm run build
